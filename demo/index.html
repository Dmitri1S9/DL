<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>B1 Droid · Text-to-Speech</title>
<style>
  :root {
    --sw-yellow: #ffe81f;
    --sw-yellow-dim: #c9b800;
    --space: #05060a;
    --panel: rgba(10, 12, 20, 0.72);
    --line: rgba(255, 232, 31, 0.28);
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body {
    background: var(--space);
    color: #e8e8ea;
    font-family: "SF Mono", "JetBrains Mono", ui-monospace, "Cascadia Code", Menlo, monospace;
    overflow-x: hidden;
    min-height: 100%;
  }
  /* layered starfield */
  .stars, .stars::after {
    content: "";
    position: fixed; inset: -50%;
    background-image:
      radial-gradient(1px 1px at 20% 30%, #fff, transparent),
      radial-gradient(1px 1px at 70% 60%, #fff, transparent),
      radial-gradient(1.5px 1.5px at 40% 80%, #fff, transparent),
      radial-gradient(1px 1px at 85% 20%, #cfd, transparent),
      radial-gradient(1px 1px at 10% 70%, #fff, transparent),
      radial-gradient(1.5px 1.5px at 55% 15%, #fff, transparent),
      radial-gradient(1px 1px at 90% 85%, #fff, transparent),
      radial-gradient(1px 1px at 30% 50%, #def, transparent);
    background-repeat: repeat;
    background-size: 600px 600px;
    z-index: 0;
    opacity: 0.55;
    animation: drift 120s linear infinite;
  }
  .stars::after { background-size: 380px 380px; opacity: 0.35; animation-duration: 200s; }
  @keyframes drift { from { transform: translateY(0); } to { transform: translateY(-600px); } }

  .wrap {
    position: relative; z-index: 1;
    max-width: 720px; margin: 0 auto;
    padding: 7vh 24px 48px;
  }
  .intro {
    color: var(--sw-yellow);
    font-style: italic;
    letter-spacing: 0.04em;
    opacity: 0.85;
    font-size: 14px;
    margin: 0 0 18px;
  }
  h1 {
    color: var(--sw-yellow);
    font-weight: 800;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    font-size: clamp(28px, 6vw, 48px);
    line-height: 1.05;
    margin: 0 0 6px;
    text-shadow: 0 0 24px rgba(255, 232, 31, 0.35);
  }
  .sub {
    color: #9aa0aa; font-size: 13px; letter-spacing: 0.06em;
    margin: 0 0 28px; text-transform: uppercase;
  }
  .badge {
    display: inline-block; padding: 3px 10px; border: 1px solid var(--line);
    border-radius: 999px; color: var(--sw-yellow-dim); font-size: 12px;
  }
  .panel {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 20px;
    backdrop-filter: blur(6px);
    box-shadow: 0 0 60px rgba(0, 0, 0, 0.6);
  }
  label { display: block; font-size: 12px; letter-spacing: 0.1em; color: #8b909b; text-transform: uppercase; margin-bottom: 8px; }
  textarea {
    width: 100%; min-height: 120px; resize: vertical;
    background: #0a0c12; color: #f2f2f4;
    border: 1px solid rgba(255,255,255,0.12); border-radius: 10px;
    padding: 14px; font: inherit; font-size: 15px; line-height: 1.5;
    outline: none;
  }
  textarea:focus { border-color: var(--sw-yellow); box-shadow: 0 0 0 3px rgba(255,232,31,0.12); }
  .row { display: flex; gap: 12px; align-items: center; margin-top: 16px; flex-wrap: wrap; }
  button {
    appearance: none; cursor: pointer;
    background: var(--sw-yellow); color: #1a1600;
    border: none; border-radius: 10px;
    font: inherit; font-weight: 800; letter-spacing: 0.12em; text-transform: uppercase;
    padding: 13px 24px; font-size: 14px;
    transition: transform 0.08s ease, box-shadow 0.2s ease, opacity 0.2s;
    box-shadow: 0 0 24px rgba(255,232,31,0.25);
  }
  button:hover:not(:disabled) { transform: translateY(-1px); box-shadow: 0 0 32px rgba(255,232,31,0.45); }
  button:active:not(:disabled) { transform: translateY(0); }
  button:disabled { opacity: 0.5; cursor: progress; }
  .status { color: #8b909b; font-size: 13px; min-height: 18px; }
  .status.err { color: #ff6b6b; }
  audio { width: 100%; margin-top: 18px; display: none; }
  audio.show { display: block; }
  .chips { margin-top: 14px; display: flex; gap: 8px; flex-wrap: wrap; }
  .chip {
    cursor: pointer; font-size: 12px; color: #cfd2d8;
    border: 1px dashed rgba(255,255,255,0.18); border-radius: 999px;
    padding: 5px 11px; background: transparent; letter-spacing: 0.02em;
    text-transform: none; font-weight: 400;
  }
  .chip:hover { border-color: var(--sw-yellow); color: var(--sw-yellow); }
  footer { margin-top: 26px; color: #5a5f69; font-size: 12px; letter-spacing: 0.04em; }
  .dot { display:inline-block; width:7px; height:7px; border-radius:50%; background:#3ad17a; margin-right:6px; box-shadow:0 0 8px #3ad17a; }
</style>
</head>
<body>
<div class="stars"></div>
<div class="wrap">
  <p class="intro">A long time ago in a galaxy far, far away&hellip;</p>
  <h1>B1 Droid<br />Text&#8209;to&#8209;Speech</h1>
  <p class="sub">VITS fine&#8209;tuned on the B1 battle&#8209;droid voice &nbsp;·&nbsp; <span class="badge" id="badge">loading&hellip;</span></p>

  <div class="panel">
    <label for="text">Transmission text</label>
    <textarea id="text" placeholder="Roger roger. All units, proceed with the mission. Standing by.">Roger roger. All units, proceed with the mission. Standing by.</textarea>

    <div class="chips" id="chips">
      <button class="chip">Roger roger.</button>
      <button class="chip">The clankers are advancing on the eastern flank.</button>
      <button class="chip">Halt! You are under arrest by order of the Trade Federation.</button>
      <button class="chip">Uh oh.</button>
    </div>

    <div class="row">
      <button id="go">&#9654;&nbsp; Transmit</button>
      <span class="status" id="status"><span class="dot"></span>Ready.</span>
    </div>

    <audio id="player" controls></audio>
  </div>

  <footer>Project 13 — Introduction to Deep Learning, 2026S &nbsp;·&nbsp; runs locally on your machine</footer>
</div>

<script>
  const $ = (id) => document.getElementById(id);
  const textEl = $('text'), goEl = $('go'), statusEl = $('status'), player = $('player'), badge = $('badge');

  fetch('/info').then(r => r.json()).then(d => {
    badge.textContent = (d.checkpoint || 'unknown') + ' · ' + (d.device || '');
  }).catch(() => { badge.textContent = 'offline'; });

  document.querySelectorAll('.chip').forEach(c => c.addEventListener('click', () => {
    textEl.value = c.textContent;
    textEl.focus();
  }));

  function setStatus(msg, isErr) {
    statusEl.className = 'status' + (isErr ? ' err' : '');
    statusEl.innerHTML = (isErr ? '' : '<span class="dot"></span>') + msg;
  }

  async function transmit() {
    const text = textEl.value.trim();
    if (!text) { setStatus('Enter some text first.', true); return; }
    goEl.disabled = true;
    setStatus('Synthesizing&hellip; the droid is warming up.');
    try {
      const res = await fetch('/synthesize', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ text })
      });
      if (!res.ok) {
        const e = await res.json().catch(() => ({}));
        throw new Error(e.error || ('HTTP ' + res.status));
      }
      const blob = await res.blob();
      player.src = URL.createObjectURL(blob);
      player.classList.add('show');
      player.play().catch(() => {});
      setStatus('Transmission received. Roger roger.');
    } catch (err) {
      setStatus('Failed: ' + err.message, true);
    } finally {
      goEl.disabled = false;
    }
  }

  goEl.addEventListener('click', transmit);
  textEl.addEventListener('keydown', (e) => {
    if ((e.metaKey || e.ctrlKey) && e.key === 'Enter') transmit();
  });
</script>
</body>
</html>
