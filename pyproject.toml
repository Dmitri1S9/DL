[tool.ruff]
target-version = "py312"
line-length = 88
exclude = [
    ".venv",
    "data",
    "models",
    "audio",
]

[tool.ruff.format]
quote-style = "single"

[tool.ruff.lint]
select = ["E", "F", "W", "B", "C4", "SIM", "RUF"]
ignore = [
    "E501",
    "E731",
]

[tool.ruff.lint.per-file-ignores]
# effects.py documents English-vs-Russian pronunciation with IPA symbols
# (ɪ, ɛ, ɔ, ...), which the ambiguous-unicode checks would otherwise flag.
"src/effects/effects.py" = ["RUF001", "RUF003"]

[tool.pytest.ini_options]
pythonpath = ["src"]
testpaths = ["tests"]
addopts = "-q"