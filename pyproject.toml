toml[tool.ruff]
target-version = "py312"
line-length = 88
exclude = [
    ".venv",
    "data",
    "models",
    "audio",
]

[tool.ruff.format]
quote-style = "single"

[tool.ruff.lint]
select = ["E", "F", "W", "B", "C4", "SIM", "RUF"]
ignore = [
    "E501", 
    "E731", 
]

[tool.pytest.ini_options]
pythonpath = ["src"]
testpaths = ["tests"]
addopts = "-q"